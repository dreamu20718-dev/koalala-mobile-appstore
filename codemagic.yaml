workflows:
  ios_testflight:
    name: Koalala iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: app_store_connect

    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.iplay.koalala"
        MARKETING_VERSION: "1.0.0"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      node: 20

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.npm

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Prepare iOS web assets
        script: |
          node scripts/sync-web.cjs
          npx cap sync ios

      - name: Install Codemagic CLI tools
        script: |
          pip3 install codemagic-cli-tools

      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Set code signing settings
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Update app version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$MARKETING_VERSION"
          agvtool new-version -all "${BUILD_NUMBER:-1001}"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
